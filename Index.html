<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESAFIO_SPRINT</title>
    <link rel="stylesheet" href="css/style-home.css">
    <link rel="stylesheet" href="css/header-footer-reset.css">

</head>

<body>
    <header>
        <img src="img/logo-ford-256.png" alt="Imagem do logo da Ford" class="logo-canto">

        <nav class="menu">
            <!-- Botoes home -->
            <a href="Index.html" class="buttonhome">Home</a>
            <a href="lancamento.html" class="buttonlaca">Lançamento</a>
            <a href="contato.html" class="buttoncontato">Contato</a>
        </nav>
    </header>


    <main>


        <div class="carrossel">
            <div class="carrossel-fila"> 

                <!-- Criação dos radio -->
                <input type="radio" name="radio-btn" id="radio1">
                <input type="radio" name="radio-btn" id="radio2">
                <input type="radio" name="radio-btn" id="radio3">

                <div class="first_slide">
                    <img src="img/imagem_1.jpg" alt="imagem_1">
                </div>

                <div class="slide">
                    <img src="img/imagem_2.jpg" alt="imagem_2">
                </div>

                <div class="slide">
                    <img src="img/imagem_3.jpg" alt="imagem_3">
                </div>

            </div>

            <!-- botoes de navegação -->

            <div class="navagation-auto">

                <div class="auto-btn1"></div>
                <div class="auto-btn2"></div>
                <div class="auto-btn3"></div>


            </div>


            <div class="navagation-manual">

                <label for="radio1" class="manual-btn"></label>
                <label for="radio2" class="manual-btn"></label>
                <label for="radio3" class="manual-btn"></label>

            </div>
        </div>

        <p class="novidadetropa">Está é a nova ford ranger 2022. Confira as novidades <a href="lancamento.html">aqui</a>
        </p>

    </main>
    <footer>

        <div class="redes-socias">
            <p id="text">Redes Sociais: </p>

            <a href="https://www.instagram.com/Ford" target="_blank">
                <img src="img/instagram-logo-50.png" alt="Instagram">
            </a>
            <a href="https://www.youtube.com/@ford" target="_blank">
                <img src="img/youtube-squared-50.png" alt="youtube">
            </a>
            <a href="https://www.facebook.com/FordBrasil/" target="_blank">
                <img src="img/facebook-50.png" alt="facebook">
            </a>
        </div>
        <p class="Copyright">© 2026 Ford Brasil | Viva o Novo. Todos os direitos reservados.</p>
        <img src="img/ford-96.png" alt="Logo Ford">
    </footer>

    <script src="js/carrossel.js"></script>
</body>

</html>
