<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="css/contato.css">
    <link rel="stylesheet" href="css/header-footer-reset.css">
</head>

<body>

    <header>
        <img src="img/logo-ford-256.png" alt="Imagem do logo da Ford" class="logo-canto">

        <nav class="menu">
            <!-- Botoes home -->
            <a href="Index.html" class="buttonhome">Home</a>
            <a href="lancamento.html" class="buttonlaca">Lançamento</a>
            <a href="contato.html" class="buttoncontato">Contato</a>
        </nav>
    </header>

    <main>

        <img src="img/xls 2.2 diesel.jpg" alt="Carro XLS" class="imagemcentral">
        <div class="formulario-container">
            <form class="form-contato" onsubmit="event.preventDefault(); Post(); Enviar();">

                <input type="text" id="nomeid" placeholder="NOME*">
                <input type="text" id="sobrenomeid" placeholder="SOBRENOME*">
                <input type="email" id="emailid" placeholder="E-MAIL*">
                <input type="text" id="cpfid" placeholder="CPF*">
                <input type="tel" id="telefoneid" placeholder="TELEFONE*">

                <select class="aipapai">
                    <option value="">O que deseja contactar?</option>
                    <option value="Reclamações">Reclamações</option>
                    <option value="Elogios">Elogios</option>
                    <option value="Solicitação">Solicitação</option>
                </select>

                <button type="submit" class="btn-enviar">Enviar</button>

            </form>
        </div>



    </main>

    <footer>

        <div class="redes-socias">
            <p>Redes Sociais: </p>

            <a href="https://www.instagram.com/Ford" target="_blank">
                <img src="img/instagram-logo-50.png" alt="Instagram">
            </a>
            <a href="https://www.youtube.com/@ford" target="_blank">
                <img src="img/youtube-squared-50.png" alt="youtube">
            </a>
            <a href="https://www.facebook.com/FordBrasil/" target="_blank">
                <img src="img/facebook-50.png" alt="facebook">
            </a>
        </div>
        <p class="Copyright">© 2026 Ford Brasil | Viva o Novo. Todos os direitos reservados.</p>
        <img src="img/ford-96.png" alt="Logo Ford">

    </footer>
    <script src="js/forms.js"></script>
</body>

</html>
